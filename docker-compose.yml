version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: arbitrage_db
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=arb_secret
      - POSTGRES_DB=vectordb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: