services:
  db:
    image: pgvector/pgvector:pg16
    container_name: arbitrage_db
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=arb_secret
      - POSTGRES_DB=vectordb
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: arbitrage_bot
    restart: always
    depends_on:
      - db
    environment:
      - DB_URI=postgresql://app:arb_secret@db:5432/vectordb

volumes:
  pgdata:
